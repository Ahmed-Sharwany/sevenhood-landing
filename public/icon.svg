<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="geometricPrecision">
  <!-- Hexagon background -->
  <polygon
    points="50,4 95,27 95,73 50,96 5,73 5,27"
    fill="#0D2818"
  />
  <!-- Subtle inner hex ring for depth -->
  <polygon
    points="50,11 88,31 88,69 50,89 12,69 12,31"
    fill="none"
    stroke="#C87C2A"
    stroke-width="1.2"
    stroke-opacity="0.35"
  />
  <!-- The "7" numeral -->
  <text
    x="50"
    y="71"
    text-anchor="middle"
    font-size="52"
    font-weight="700"
    font-family="Georgia, 'Times New Roman', serif"
    fill="#C87C2A"
    letter-spacing="-1"
  >7</text>
</svg>
